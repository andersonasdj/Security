<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="shortcut icon" href="assets/img/favicon.ico">
	<link rel="stylesheet" href="assets/css/bootstrap-icons.min.css">
	<title>Sentinel — Acesso negado</title>
	<style>
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

		:root {
			--navy:    #0f172a;
			--border:  rgba(255,255,255,.07);
			--text:    #f1f5f9;
			--muted:   #94a3b8;
			--amber:   #f59e0b;
			--amber-d: #d97706;
		}

		html, body {
			height: 100%;
			background: var(--navy);
			color: var(--text);
			font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
		}

		body {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			padding: 2rem 1.25rem;
			text-align: center;
		}

		body::before {
			content: '';
			position: fixed; inset: 0; z-index: 0;
			background-image:
				linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
				linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
			background-size: 48px 48px;
			pointer-events: none;
		}

		body::after {
			content: '';
			position: fixed;
			top: -20%; left: 50%; transform: translateX(-50%);
			width: 600px; height: 400px;
			background: radial-gradient(ellipse, rgba(245,158,11,.1) 0%, transparent 70%);
			pointer-events: none; z-index: 0;
		}

		.wrapper { position: relative; z-index: 1; max-width: 520px; width: 100%; }

		.brand {
			display: inline-flex; align-items: center; gap: .5rem;
			margin-bottom: 3rem;
		}
		.brand-logo {
			background: #fff; border-radius: 8px;
			padding: 5px 11px;
			box-shadow: 0 2px 12px rgba(0,0,0,.4);
			display: flex; align-items: center;
		}
		.brand-logo img { height: 24px; display: block; }
		.brand-name {
			font-size: .85rem; font-weight: 700;
			color: var(--muted); letter-spacing: .04em;
		}

		.error-code {
			font-size: clamp(6rem, 20vw, 9rem);
			font-weight: 900; letter-spacing: -.06em; line-height: 1;
			background: linear-gradient(135deg, #fff 30%, var(--muted) 100%);
			-webkit-background-clip: text; -webkit-text-fill-color: transparent;
			background-clip: text;
			margin-bottom: .5rem;
			animation: fadeDown .55s ease both;
		}

		.error-icon {
			width: 64px; height: 64px;
			background: rgba(245,158,11,.1);
			border: 1px solid rgba(245,158,11,.2);
			border-radius: 18px;
			display: inline-flex; align-items: center; justify-content: center;
			font-size: 1.8rem; color: var(--amber);
			margin: 0 auto 1.5rem;
			animation: fadeDown .55s .1s ease both;
		}

		.error-title {
			font-size: 1.35rem; font-weight: 700;
			color: var(--text); margin-bottom: .6rem;
			animation: fadeDown .55s .15s ease both;
		}

		.error-desc {
			font-size: .92rem; color: var(--muted);
			line-height: 1.65; margin-bottom: 2rem;
			animation: fadeDown .55s .2s ease both;
		}

		.actions {
			display: flex; gap: .75rem;
			justify-content: center; flex-wrap: wrap;
			animation: fadeDown .55s .25s ease both;
		}

		.btn-primary-custom {
			display: inline-flex; align-items: center; gap: .45rem;
			background: var(--amber);
			color: #0f172a; font-size: .88rem; font-weight: 700;
			border: none; border-radius: 10px;
			padding: .65rem 1.4rem;
			cursor: pointer; text-decoration: none;
			transition: background .15s, transform .12s;
		}
		.btn-primary-custom:hover {
			background: var(--amber-d); color: #0f172a; transform: translateY(-1px);
		}

		.divider {
			margin: 2.5rem auto 1.5rem;
			width: 60px; height: 1px;
			background: var(--border);
			animation: fadeDown .55s .3s ease both;
		}

		.page-footer {
			font-size: .73rem; color: #475569;
			animation: fadeDown .55s .35s ease both;
		}

		@keyframes fadeDown {
			from { opacity: 0; transform: translateY(-10px); }
			to   { opacity: 1; transform: translateY(0); }
		}

		@media (max-width: 480px) {
			.brand { margin-bottom: 2rem; }
			.btn-primary-custom { width: 100%; justify-content: center; }
		}
	</style>
</head>
<body>

<div class="wrapper">

	<div class="brand">
		<div class="brand-logo">
			<img src="assets/img/p1.png" alt="ProviderOne">
		</div>
		<span class="brand-name">Sentinel</span>
	</div>

	<div class="error-code">403</div>

	<div class="error-icon">
		<i class="bi bi-shield-lock-fill"></i>
	</div>

	<h1 class="error-title">Acesso negado</h1>
	<p class="error-desc">
		Você não tem permissão para acessar este recurso.<br>
		Se acredita que isso é um erro, contate o administrador.
	</p>

	<div class="actions">
		<a href="javascript:history.back()" class="btn-primary-custom">
			<i class="bi bi-arrow-left"></i> Página anterior
		</a>
	</div>

	<div class="divider"></div>

	<p class="page-footer">© 2026 TechGold · Sentinel</p>

</div>

</body>
</html>
